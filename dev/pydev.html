<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Editor with Pyodide</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/addon/lint/lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/addon/lint/python-lint.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/addon/lint/lint.min.css">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
    <style>
        #editor, #output {
            width: 45%;
            height: 400px;
            float: left;
            margin: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        #runButton {
            clear: both;
            display: block;
            margin: 10px;
        }

        #tabs {
            clear: both;
            margin-top: 20px;
        }

        .tab {
            display: inline-block;
            padding: 10px;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .tab-content {
            display: none;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }

        .active-tab {
            background-color: #f0f0f0;
        }

        .active-content {
            display: block;
        }
    </style>
    <style>
        .tab {
            display: none;
        }

        .tab.active {
            display: block;
        }

        .grid {
            display: grid;
            gap: 1px;
        }

        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid black;
            position: relative;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid cyan;
            position: absolute;
            top: 15px;
            left: 15px;
        }

        .triangle.right {
            transform: rotate(90deg);
        }

        .triangle.up {
            transform: rotate(0deg);
        }

        .triangle.left {
            transform: rotate(-90deg);
        }

        .triangle.down {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
<textarea id="editor"></textarea>
<button id="runButton">Run</button>
<div id="tabs"></div>
<div id="world-container"></div>
<div id="button-container"></div>

<script>
    let pyodideReadyPromise = loadPyodide().then(async pyodide => {
        const byubit_wheel = "byubitweb-0.1.0-py3-none-any.whl";
        await pyodide.loadPackage("micropip");

        await pyodide.runPythonAsync(`
            import micropip
            await micropip.install('${byubit_wheel}')
        `);

        // Add worlds folder to pyodide filesystem
        // Fetch the list of files in the "worlds" folder
        const response = await fetch('worlds/');
        const text = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const files = Array.from(doc.querySelectorAll('a')).map(a => 'worlds/' + a.getAttribute('href'));
        console.log(files);

        // Load each file into Pyodide
        pyodide.FS.mkdir('/home/pyodide/worlds');
        for (const file of files) {
            const fileResponse = await fetch(file);
            const fileContent = await fileResponse.text();
            console.log('/worlds/' + file.split('/').pop());
            pyodide.FS.writeFile('/home/pyodide/worlds/' + file.split('/').pop(), fileContent);
        }

        console.log(pyodide.FS.readdir('/home/pyodide/worlds'));

        return pyodide;
    });


    const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
        mode: 'python',
        lineNumbers: true,
        autoCloseBrackets: true,
        gutters: ["CodeMirror-lint-markers"],
        lint: true
    });


    let data = {};
    let currentTab = null;
    let currentIndex = {};

    function createTabs() {
        const tabsContainer = document.getElementById('tabs');
        tabsContainer.innerHTML = ''; // Clear existing tabs
        Object.keys(data).forEach(key => {
            const tabButton = document.createElement('button');
            tabButton.innerText = key;
            tabButton.className = 'tab-button';
            if (key === currentTab) {
                tabButton.classList.add('active');
            }
            tabButton.onclick = () => switchTab(key);
            tabsContainer.appendChild(tabButton);
            currentIndex[key] = 0;
        });

        if (!currentTab) {
            currentTab = Object.keys(data)[0];
            switchTab(currentTab);
        }

        const firstButton = document.createElement('button');
        firstButton.innerText = 'First';
        firstButton.classList.add('button');
        firstButton.onclick = () => {
            currentIndex[currentTab] = 0;
            renderWorld();
        };

        const prevButton = document.createElement('button');
        prevButton.innerText = 'Previous';
        prevButton.classList.add('button');
        prevButton.onclick = () => {
            if (currentIndex[currentTab] > 0) {
                currentIndex[currentTab]--;
                renderWorld();
            }
        };

        const nextButton = document.createElement('button');
        nextButton.innerText = 'Next';
        nextButton.classList.add('button');
        nextButton.onclick = () => {
            if (currentIndex[currentTab] < data[currentTab].length - 1) {
                currentIndex[currentTab]++;
                renderWorld();
            }
        };

        const lastButton = document.createElement('button');
        lastButton.innerText = 'Last';
        lastButton.classList.add('button');
        lastButton.onclick = () => {
            currentIndex[currentTab] = data[currentTab].length - 1;
            renderWorld();
        };

        // TODO - add jump buttons

        const buttonContainer = document.getElementById('button-container');
        buttonContainer.innerHTML = '';
        buttonContainer.appendChild(firstButton);
        buttonContainer.appendChild(prevButton);
        buttonContainer.appendChild(nextButton);
        buttonContainer.appendChild(lastButton);
    }

    function switchTab(tab) {
        currentTab = tab;
        const tabsContainer = document.getElementById('tabs');
        Array.from(tabsContainer.children).forEach(button => {
            button.classList.remove('active');
            if (button.innerText === tab) {
                button.classList.add('active');
            }
        });
        renderWorld();
    }

    function renderWorld() {
        const worldContainer = document.getElementById('world-container');
        worldContainer.innerHTML = '';
        const worldData = data[currentTab][currentIndex[currentTab]].world;
        const pos = data[currentTab][currentIndex[currentTab]].pos;
        const orientation = data[currentTab][currentIndex[currentTab]].orientation;
        const grid = document.createElement('div');
        grid.className = 'grid';
        grid.style.gridTemplateColumns = `repeat(${worldData[0].length}, 50px)`;
        grid.style.gridTemplateRows = `repeat(${worldData.length}, 50px)`;
        for (let row = worldData.length - 1; row >= 0; row--) {
            for (let col = 0; col < worldData[row].length; col++) {
                const cellColor = worldData[row][col];
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.backgroundColor = cellColor;
                if (row === pos[0] && col === pos[1]) {
                    const triangle = document.createElement('div');
                    triangle.className = 'triangle';
                    switch (orientation) {
                        case 0:
                            triangle.classList.add('right');
                            break;
                        case 1:
                            triangle.classList.add('up');
                            break;
                        case 2:
                            triangle.classList.add('left');
                            break;
                        case 3:
                            triangle.classList.add('down');
                            break;
                    }
                    cell.appendChild(triangle);
                }
                grid.appendChild(cell);
            }
        }
        worldContainer.appendChild(grid);
    }

    // if (hasSnapshots) {
    //     const prevSnapClick = () => {
    //         history = data[currentTab];
    //         const snapshots = history.slice(0, currentIndex).map((event, pos) => {
    //             if (event.name.startsWith('snapshot')) {
    //                 return pos;
    //             }
    //         }).filter(pos => pos !== undefined);
    //         currentIndex = snapshots.length ? snapshots[snapshots.length - 1] : 0;
    //     };
    //
    //     const prevSnapButton = document.createElement('button');
    //     prevSnapButton.innerText = "<< Jump";
    //     prevSnapButton.onclick = prevSnapClick;
    // }

    document.getElementById('runButton').addEventListener('click', async () => {
        let code = editor.getValue();
        // try {
        let pyodide = await pyodideReadyPromise;
        await pyodide.runPythonAsync(`
                    import sys
                    import io
                    sys.stdout = io.StringIO()
                `);
        await pyodide.runPythonAsync(code);
        var py_stdout = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        console.log(py_stdout);

        var bit_results = await pyodide.runPythonAsync("Bit.get_json_results()")
        console.log(bit_results);
        data = JSON.parse(bit_results);
        if (Object.keys(data).length === 0) {
            return;
        }
        createTabs();
        renderWorld();

        // } catch (err) {
        //     if (err instanceof Error) {
        //         console.log(err.message);
        //     } else {
        //         console.log(JSON.stringify(err));
        //     }
        // }
    });

</script>
</body>
</html>
